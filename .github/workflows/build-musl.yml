name: Build aarch64-musl
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall -y cargo-zigbuild
      - run: cargo zigbuild --release --target aarch64-unknown-linux-musl --bin zeroclaw
      - uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64-musl
          path: target/aarch64-unknown-linux-musl/release/zeroclaw
